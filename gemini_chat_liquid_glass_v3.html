      timestamp: new Date().toISOString(),
    }, '*');
  });

})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
  :root{
    /* Bảng màu tối phong cách Liquid Glass (iOS 18 style) */
    --bg-void: #05070c;
    /* Hiệu ứng kính lỏng mờ kết hợp dải màu chuyển sắc, độ bão hoà cao hơn để giống kính thật */
    --glass-bg: rgba(16, 20, 32, 0.55);
    --glass-bg-elevated: rgba(26, 32, 48, 0.6);
    --glass-bg-surface: rgba(36, 44, 64, 0.5);
    --glass-bg-surface-2: rgba(54, 64, 92, 0.6);
    --glass-blur: 34px;
    --glass-sat: 180%;

    /* Viền sáng mỏng + highlight phản chiếu ánh sáng giống kính thật */
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-border-hover: rgba(255, 255, 255, 0.22);
    --glass-highlight: rgba(255, 255, 255, 0.5);
    --line: rgba(255, 255, 255, 0.06);

    --text-primary: #f5f7fc;
    --text-muted: #a3adc2;
    --text-faint: #6c7893;

    /* Gradient nhấn */
    --accent-a: #ff3040; /* Đỏ hồng ấm */
    --accent-b: #b430ff; /* Tím hoàng hôn */
    --accent-c: #4f52ff; /* Xanh neon */
    --accent-grad: linear-gradient(135deg, #ff3040, #d62976, #962fbf, #4f52ff);
    --danger: #ff5263;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 11px;
    --ease-spring: cubic-bezier(.34,1.56,.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
  h1,h2,h3,.brand,.new-chat-btn,.session-title{font-family:'Sora',-apple-system,sans-serif;}

  /* Khoá cứng viewport để tránh cả trang bị trượt/bật lên khi kéo hoặc khi bàn phím mobile xuất hiện */
  html{
    height:100%;
    overflow:hidden;
    overscroll-behavior:none;
    -webkit-text-size-adjust:100%;
  }
  /* Tạo nền sâu thẳm có đốm sáng gradient động phía sau lớp kính */
  body {
    background: var(--bg-void);
    height: calc(var(--app-height, 100vh));
    color: var(--text-primary);
    position: fixed;
    inset: 0;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body::before, body::after {
    content: '';
    position: absolute;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    filter: blur(130px);
    z-index: 0;
    opacity: 0.28;
    pointer-events: none;
    animation: pulseGlow 12s infinite alternate ease-in-out;
    will-change: transform;
  }
  body::before {
    background: var(--accent-b);
    top: 8%;
    left: 12%;
  }
  body::after {
    background: var(--accent-a);
    bottom: 12%;
    right: 12%;
    animation-delay: 4s;
  }
  @keyframes pulseGlow {
    0% { transform: scale(1) translate(0, 0); opacity: 0.22; }
    100% { transform: scale(1.25) translate(30px, 20px); opacity: 0.38; }
  }

  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:rgba(255, 255, 255, 0.14);border-radius:10px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255, 255, 255, 0.24);}
  ::-webkit-scrollbar-track{background:transparent;}

  /* Toàn bộ container mang thuộc tính Liquid Glass, cố định tuyệt đối trong viewport (không trượt) */
  .app {
    display: flex;
    height: 100%;
    max-width: 1180px;
    margin: 0 auto;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    box-shadow:
      0 24px 70px rgba(0,0,0,0.65),
      inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
    z-index: 1;
    border-left: 1px solid var(--glass-border);
    border-right: 1px solid var(--glass-border);
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:272px;
    flex-shrink:0;
    background: rgba(10, 13, 22, 0.4);
    border-right:1px solid var(--glass-border);
    display:flex;
    flex-direction:column;
    transition:transform .3s var(--ease-spring);
  }
  .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 8px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15.5px;letter-spacing:.2px;}
  .brand-mark{
    width:24px;
    height:24px;
    border-radius:8px;
    background:var(--accent-grad);
    flex-shrink:0;
    position:relative;
    overflow:hidden;
    box-shadow: 0 3px 10px rgba(180,48,255,.35);
  }
  .brand-mark::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.65),transparent 60%);}

  .new-chat-btn{
    margin:10px 16px 6px;
    padding:11px 14px;
    border:1px solid var(--glass-border);
    background: var(--glass-bg-elevated);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    color:var(--text-primary);
    border-radius:var(--radius-md);
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    text-align:left;
    display:flex;
    align-items:center;
    gap:9px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 2px 8px rgba(0,0,0,.15);
    transition: all 0.25s var(--ease-spring);
  }
  .new-chat-btn svg{width:16px;height:16px;flex-shrink:0;}
  .new-chat-btn:hover{
    border-color: var(--glass-border-hover);
    background: var(--glass-bg-surface);
    transform: translateY(-1px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 6px 16px rgba(0,0,0,0.2);
  }
  .new-chat-btn:active{transform: scale(.97) translateY(0);}

  .session-list{flex:1;overflow-y:auto;overscroll-behavior:contain;touch-action:pan-y;padding:6px 10px;display:flex;flex-direction:column;gap:3px;}
  .session-item{
    position:relative;
    padding:9px 34px 9px 12px;
    border-radius:var(--radius-sm);
    font-size:13px;
    color:var(--text-muted);
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    border-left:2px solid transparent;
    transition:.18s;
  }
  .session-item:hover{background:var(--glass-bg-elevated);color:var(--text-primary);}
  .session-item.active{
    background:var(--glass-bg-surface);
    color:var(--text-primary);
    border-left-color: #d62976;
    border-right: 1px solid var(--glass-border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  }
  .session-item .del-btn{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--text-faint);cursor:pointer;
    padding:5px;border-radius:7px;opacity:0;transition:.15s;
    display:flex;align-items:center;justify-content:center;
  }
  .session-item .del-btn svg{width:13px;height:13px;}
  .session-item:hover .del-btn{opacity:1;}
  .session-item .del-btn:hover{color:var(--danger);background:rgba(255,82,99,.15);}

  .sidebar-footer{padding:10px 12px 14px;border-top:1px solid var(--glass-border);display:flex;flex-direction:column;gap:6px;}
  .icon-btn{
    background:none;border:none;color:var(--text-muted);font-size:13px;cursor:pointer;
    padding:9px 10px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:9px;
    width:100%;transition:.2s;
    border: 1px solid transparent;
  }
  .icon-btn svg{width:15px;height:15px;flex-shrink:0;}
  .icon-btn:hover{
    background:var(--glass-bg-elevated);
    color:var(--text-primary);
    border: 1px solid var(--glass-border);
  }
  .icon-btn:active{transform:scale(.97);}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:15;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  .overlay.show{display:block;}

  /* ---------- Chat container ---------- */
  .chat-container{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;background: transparent;}

  .header{
    background: rgba(14, 18, 30, 0.35);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    padding:13px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid var(--glass-border);
    box-shadow: inset 0 -1px 0 rgba(255,255,255,.03);
    flex-shrink:0;
    position:relative;
    z-index:5;
  }
  .header h2{font-size:15.5px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .model-badge{
    font-size:11.5px;
    font-weight:500;
    color:var(--text-muted);
    background:var(--glass-bg-surface);
    border:1px solid var(--glass-border);
    padding:6px 12px;
    border-radius:20px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    transition:.2s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    font-family:-apple-system,'Inter',sans-serif;
  }
  .model-badge:hover{border-color: var(--accent-b);color:var(--text-primary);background:var(--glass-bg-surface-2);}
  .model-badge:active{transform:scale(.96);}
  .model-badge .chevron{width:11px;height:11px;transition:transform .25s var(--ease-spring);flex-shrink:0;}
  .model-badge.open .chevron{transform:rotate(180deg);}
  .model-switch-wrap{position:relative;flex-shrink:0;}

  .model-switch-panel{
    position:absolute;top:calc(100% + 8px);right:0;min-width:250px;z-index:30;
    background: rgba(20, 25, 40, 0.82);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-radius:var(--radius-lg);
    box-shadow:0 20px 50px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.1);
    padding:8px;display:none;flex-direction:column;gap:2px;
    animation: popIn .22s var(--ease-spring);
  }
  @keyframes popIn{from{opacity:0;transform:translateY(-6px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .model-switch-panel.open{display:flex;}
  .model-switch-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius-md);cursor:pointer;transition:.15s;}
  .model-switch-item:hover{background:var(--glass-bg-surface-2);}
  .model-switch-item .msi-check{width:16px;flex-shrink:0;margin-top:2px;color:var(--text-primary);}
  .model-switch-item .msi-check svg{width:15px;height:15px;display:none;}
  .model-switch-item.active .msi-check svg{display:block;}
  .model-switch-item .msi-name{font-size:14.5px;font-weight:500;color:var(--text-primary);font-family:'Sora',sans-serif;}
  .model-switch-item .msi-desc{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .only-desktop{display:flex;}
  .only-mobile{display:none;}

  /* Bảng cài đặt Liquid Glass sang xịn */
  .settings-panel{
    background: rgba(16, 21, 34, 0.7);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-bottom:1px solid var(--glass-border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    padding:16px 18px;
    display:none;
    flex-wrap:wrap;
    gap:10px;
    position:relative;
  }
  .settings-panel.open{display:flex;animation:popIn .2s var(--ease-spring);}
  .settings-panel-head{flex:1 1 100%;display:flex;align-items:center;justify-content:space-between;margin:-2px 0 2px;}
  .settings-panel-head span{font-size:12.5px;font-weight:600;color:var(--text-primary);font-family:'Sora',sans-serif;display:flex;align-items:center;gap:7px;}
  .settings-panel-head span svg{width:14px;height:14px;}
  .settings-close-btn{
    background:var(--glass-bg-surface);
    border:1px solid var(--glass-border);
    color:var(--text-muted);
    width:26px;
    height:26px;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    transition:.2s;
    flex-shrink:0;
  }
  .settings-close-btn svg{width:12px;height:12px;}
  .settings-close-btn:hover{color:var(--text-primary);border-color:var(--accent-b);}
  .settings-close-btn:active{transform:scale(.9);}

  .settings-panel .group{flex:1 1 calc(50% - 10px);min-width:130px;}
  .settings-panel label{display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:11px;margin-bottom:4px;font-weight:500;}
  .settings-panel label svg{width:12px;height:12px;flex-shrink:0;opacity:.8;}
  
  .settings-panel input, .settings-panel textarea, .settings-panel select {
    width:100%;
    padding:7px 11px;
    border:1px solid var(--glass-border);
    border-radius:10px;
    background: rgba(8, 11, 20, 0.5);
    color:var(--text-primary);
    font-size:12.5px;
    outline:none;
    transition: 0.2s;
  }
  .settings-panel input:focus, .settings-panel textarea:focus, .settings-panel select:focus {
    border-color: var(--accent-b);
    background: rgba(8, 11, 20, 0.8);
    box-shadow: 0 0 10px rgba(180, 48, 255, 0.15);
  }
  .settings-panel textarea{resize:vertical;min-height:44px;}
  .settings-panel .full{flex:1 1 100%;}
  .settings-panel .btn-save{
    background:var(--accent-grad);
    border:none;color:#fff;
    padding:8px 20px;
    border-radius:20px;
    font-weight:600;
    cursor:pointer;
    font-size:12.5px;
    display:flex;align-items:center;gap:6px;
    box-shadow: 0 4px 15px rgba(214, 41, 118, 0.25);
    transition: 0.2s;
  }
  .settings-panel .btn-save svg{width:13px;height:13px;}
  .settings-panel .btn-save:hover{
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(214, 41, 118, 0.4);
  }
  .settings-panel .btn-save:active{transform:scale(.96);}

  .key-row{display:flex;gap:6px;}
  .key-row input{flex:1;}
  .key-row button{
    background:var(--glass-bg-surface-2);
    border:1px solid var(--glass-border);
    color:var(--text-primary);
    padding:7px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:12px;
    white-space:nowrap;
    transition: 0.2s;
  }
  .key-row button:hover{
    border-color: var(--accent-b);
  }
  .key-row button:active{transform:scale(.96);}

  /* Tin nhắn hội thoại — khung cố định tuyệt đối, chỉ vùng này cuộn, không trượt cả trang */
  .messages{
    flex:1;
    min-height:0;
    overflow-y:auto;
    overflow-x:hidden;
    overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    touch-action:pan-y;
    -webkit-user-select:text;
    user-select:text;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
    position:relative;
  }

  .msg{
    max-width:78%;
    padding:11px 15px;
    border-radius:var(--radius-lg);
    word-wrap:break-word;
    font-size:14px;
    line-height:1.6;
    animation:fade .22s var(--ease-spring);
    border: 1px solid var(--glass-border);
  }
  /* Phía User mang phong cách Neon */
  .msg.user{
    align-self:flex-end;
    background: linear-gradient(135deg, #4f52ff 0%, #a230ff 100%);
    color:#fff;
    border-bottom-right-radius:5px;
    border: none;
    box-shadow: 0 4px 15px rgba(79, 82, 255, 0.3), inset 0 1px 0 rgba(255,255,255,.2);
  }
  .msg.bot{
    align-self:flex-start;
    background: rgba(255, 255, 255, 0.055);
    color:var(--text-primary);
    border-bottom-left-radius:5px;
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  }
  .msg.bot p{margin:4px 0;}
  .msg.bot ul,.msg.bot ol{padding-left:20px;margin:4px 0;}
  .msg.bot code{background:rgba(0, 0, 0, 0.35);padding:2px 6px;border-radius:4px;font-family:'Courier New',monospace;font-size:13px;border: 1px solid var(--glass-border);}

  /* ---------- code block card (Liquid glass dark) ---------- */
  .code-card{
    margin:8px 0;
    border-radius:10px;
    overflow:hidden;
    background: rgba(5, 7, 12, 0.8);
    border:1px solid var(--glass-border);
  }
  .code-card-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 10px;
    background: rgba(255, 255, 255, 0.03);
    border-bottom:1px solid var(--glass-border);
    font-size:10.5px;color:var(--text-muted);font-family:'Courier New',monospace;
  }
  .code-card-lang{text-transform:lowercase;letter-spacing:.3px;}
  .code-copy-btn{
    display:flex;align-items:center;gap:5px;border:none;
    background:rgba(255, 255, 255, 0.05);
    color:var(--text-primary);
    font-size:11px;font-weight:600;padding:4px 9px;border-radius:8px;cursor:pointer;transition:.15s;
  }
  .code-copy-btn:hover{background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);}
  .code-copy-btn:active{transform:scale(.94);}
  .code-copy-btn svg{width:11px;height:11px;}
  .code-card pre{margin:0;padding:11px 13px;overflow-x:auto;background:none;border-radius:0;}
  .code-card pre code{background:none;padding:0;font-size:12.5px;}

  /* ---------- copy message button ---------- */
  .msg{user-select:text;position:relative;}
  .msg-copy-btn{
    display:inline-flex;align-items:center;gap:4px;margin-top:6px;
    padding:3px 9px;border-radius:20px;
    border:1px solid rgba(255,255,255,0.06);
    background:rgba(255,255,255,0.04);
    color:var(--text-faint);font-size:10px;cursor:pointer;transition:.15s;
  }
  .msg-copy-btn:hover{color:var(--text-primary);background:rgba(255,255,255,.08);}
  .msg-copy-btn:active{transform:scale(.94);}
  .msg-copy-btn svg{width:10px;height:10px;}

  .msg.system{
    align-self:center;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border:1px solid var(--glass-border);
    color:var(--text-muted);font-size:11.5px;padding:6px 16px;border-radius:20px;max-width:90%;text-align:center;
  }
  .msg .file-preview{max-width:100%;max-height:220px;border-radius:10px;margin-top:8px;display:block;}

  .file-chip{
    display:flex;align-items:center;gap:7px;
    background:rgba(0,0,0,0.25);
    border:1px solid var(--glass-border);
    padding:6px 10px;border-radius:10px;margin-top:8px;font-size:12px;color:var(--text-muted);
  }
  .file-chip.expired{opacity:.6;font-style:italic;}

  .typing{
    align-self:flex-start;display:flex;gap:4px;padding:13px 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-radius:var(--radius-lg);border-bottom-left-radius:5px;
    border: 1px solid var(--glass-border);
  }
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:bounce 1.1s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* Khung Input Liquid Glass bo cong mềm mại — cố định ở đáy, không trượt/nảy khi bàn phím mobile bật lên */
  .input-area{
    background: rgba(14, 18, 30, 0.4);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    border-top:1px solid var(--glass-border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    padding:10px 14px 14px;
    flex-shrink:0;
    position:relative;
    z-index:5;
  }
  .attach-preview{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .attach-preview:empty{display:none;}
  .attach-chip{
    display:flex;align-items:center;gap:6px;
    background:var(--glass-bg-surface);
    border:1px solid var(--glass-border);
    padding:5px 8px 5px 11px;border-radius:20px;font-size:11.5px;color:var(--text-muted);
  }
  .attach-chip button{background:none;border:none;color:var(--text-faint);cursor:pointer;padding:3px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .attach-chip button svg{width:10px;height:10px;}
  .attach-chip button:hover{color:#fff;background:rgba(255,82,99,.75);}

  .input-row{display:flex;gap:8px;align-items:center;}
  .attach-wrap{position:relative;flex-shrink:0;}
  .attach-btn{
    flex-shrink:0;width:40px;height:40px;border-radius:50%;
    background:var(--glass-bg-surface);
    border:1px solid var(--glass-border);
    color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s var(--ease-spring);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  }
  .attach-btn svg{width:18px;height:18px;transition:transform .25s var(--ease-spring);}
  .attach-btn:hover{border-color: var(--accent-b); color:var(--text-primary); transform: scale(1.06);}
  .attach-btn:active{transform:scale(.94);}
  .attach-btn.open{color:#fff;border-color:var(--accent-b);}
  .attach-btn.open svg{transform:rotate(45deg);}

  .attach-menu{
    position:absolute;bottom:calc(100% + 10px);left:0;min-width:168px;z-index:30;
    background: rgba(20, 25, 40, 0.82);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-radius:var(--radius-lg);
    box-shadow:0 20px 50px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.1);
    padding:8px;display:none;flex-direction:column;gap:2px;
    animation: popIn .22s var(--ease-spring);
  }
  .attach-menu.open{display:flex;}
  .attach-menu-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 12px;border-radius:var(--radius-md);
    cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text-primary);
    transition:.15s;
  }
  .attach-menu-item svg{width:17px;height:17px;flex-shrink:0;color:var(--text-muted);}
  .attach-menu-item:hover{background:var(--glass-bg-surface-2);}
  .attach-menu-item:hover svg{color:var(--text-primary);}
  .attach-menu-item input{display:none;}

  .input-area input[type="text"]{
    flex:1;padding:11px 16px;
    border:1px solid var(--glass-border);
    border-radius:22px;
    background: rgba(5, 7, 12, 0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color:#fff;font-size:14px;outline:none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    transition: 0.2s;
  }
  .input-area input[type="text"]:focus{
    border-color: var(--accent-b);
    background: rgba(5, 7, 12, 0.72);
    box-shadow: 0 0 0 4px rgba(180, 48, 255, 0.12);
  }
  .input-area input[type="text"]::placeholder{color:var(--text-faint);}

  .btn-send{
    flex-shrink:0;width:40px;height:40px;border-radius:50%;
    background:var(--accent-grad);
    color:#fff;border:none;cursor:pointer;transition:.2s var(--ease-spring);
    display:flex;align-items:center;justify-content:center;
    box-shadow: 0 4px 15px rgba(214, 41, 118, 0.25), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .btn-send svg{width:17px;height:17px;margin-left:-1px;}
  .btn-send:hover:not(:disabled){filter:brightness(1.1); transform: scale(1.06); box-shadow: 0 6px 18px rgba(214, 41, 118, 0.4), inset 0 1px 0 rgba(255,255,255,.3);}
  .btn-send:active:not(:disabled){transform: scale(.92);}
  .btn-send:disabled{opacity:.35;cursor:not-allowed;filter:none;transform: none;}

  .status{color:var(--text-faint);font-size:10.5px;padding:6px 14px 0;text-align:center;}

  @media (max-width:820px){
    .app{max-width:100%; border: none;}
    .only-desktop{display:none;}
    .only-mobile{display:flex;}
    .sidebar{
      position:fixed;top:0;left:0;bottom:0;
      height:calc(var(--app-height, 100vh));
      z-index:20;transform:translateX(-100%);
      background: rgba(10, 14, 25, 0.75);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      box-shadow: 8px 0 40px rgba(0,0,0,.5);
      transition: transform .32s var(--ease-spring);
    }
    .sidebar.open{transform:translateX(0);}
    .msg{max-width:88%;}
    .settings-panel .group{flex:1 1 100%;}
    .input-area{padding-bottom:calc(14px + env(safe-area-inset-bottom));}
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand"><span class="brand-mark"></span><span>Gemini Chat</span></div>

    <div class="session-list" id="sessionList"><div class="session-item active">Cuộc trò chuyện mới<button class="del-btn" title="Xoá cuộc trò chuyện"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"></path></svg></button></div></div>

      <button class="icon-btn" id="toggleSettingsBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>Cài đặt</button>
    </div>

        <button class="settings-close-btn" id="closeSettingsBtn" title="Đóng"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>
      </div>
      <div class="group full">
        <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>API Key</label>

        <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"></path><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"></path></svg>Model</label>
        <select id="modelSelect">

      <div class="group">
        <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4.5 8-11.8V5l-8-3-8 3v5.2C4 17.5 12 22 12 22z"></path></svg>Bộ lọc an toàn (Safety)</label>

          <option value="BLOCK_NONE" selected="">BLOCK_NONE (Tắt lọc hoàn toàn)</option>
          <option value="BLOCK_ONLY_HIGH">BLOCK_ONLY_HIGH (Chỉ chặn bạo lực cực đoan)</option>
          <option value="BLOCK_MEDIUM_AND_ABOVE">BLOCK_MEDIUM_AND_ABOVE (Mặc định)</option>
          <option value="BLOCK_LOW_AND_ABOVE">BLOCK_LOW_AND_ABOVE (Lọc chặt chẽ)</option>

      <div class="group">
        <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"></path></svg>Temp</label>
        <input type="number" id="tempInput" min="0" max="2" step=".1" value=".7">
      </div>
      <div class="group">
        <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h16"></path></svg>Max tokens</label>
        <input type="number" id="maxTokensInput" min="1" max="8192" value="800">
      </div>
      <div class="group">
        <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="5"></circle><circle cx="12" cy="12" r="1"></circle></svg>Top P</label>
        <input type="number" id="topPInput" min="0" max="1" step=".05" value=".95">
      </div>
      <div class="group">
        <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"></path></svg>Top K</label>
        <input type="number" id="topKInput" min="1" max="40" value="40">
      </div>
      <div class="group full">
        <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 01-4.96.44 2.5 2.5 0 01-2.96-3.08A3 3 0 013 13.5a3 3 0 01-.34-4.44A2.5 2.5 0 015.5 6a2.5 2.5 0 014-3z"></path><path d="M14.5 2A2.5 2.5 0 0012 4.5v15a2.5 2.5 0 004.96.44 2.5 2.5 0 002.96-3.08A3 3 0 0021 13.5a3 3 0 00.34-4.44A2.5 2.5 0 0018.5 6a2.5 2.5 0 00-4-3z"></path></svg>System Instruction</label>
        <textarea id="sysInstrInput" rows="2">Bạn là trợ lý AI thông minh. Trả lời chi tiết, rõ ràng, có cấu trúc. Sử dụng xuống dòng, bullet points nếu cần.</textarea>
      </div>
      <div class="group full" style="display:flex;justify-content:flex-end;">
        <button class="btn-save" id="saveSettingsBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path><path d="M17 21v-8H7v8M7 3v5h8"></path></svg>Lưu</button>
      </div>
    </div>

    <div class="messages" id="msgContainer"><div class="msg system">🔑 Nhập API Key và bắt đầu chat</div><div class="msg bot">Chào bạn! Gemini Chat sẵn sàng.<br>Có thể gửi ảnh, video, PDF hoặc bất kỳ tệp nào kèm tin nhắn.<br><button class="msg-copy-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg><span>Sao chép</span></button></div></div>

    <div class="input-area">
      <div class="attach-preview" id="attachPreview"></div>
      <div class="input-row">
        <div class="attach-wrap" id="attachWrap">
          <button type="button" class="attach-btn" id="attachBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path></svg></button>

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
              <span>Ảnh</span>
              <input type="file" id="fileInputImage" accept="image/*" multiple="">
            </label>
            <label class="attach-menu-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="15" height="14" rx="2"></rect><path d="M23 7l-7 5 7 5V7z"></path></svg>

              <input type="file" id="fileInputVideo" accept="video/*" multiple="">

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"></path></svg>

        <button class="btn-send" id="sendBtn" disabled=""><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
      </div>
    </div>
    <div class="status" id="statusMsg">⛔ Vui lòng nhập API Key</div>
  </div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const msgContainer=$('msgContainer'), userInput=$('userInput'), sendBtn=$('sendBtn');
  const apiKeyInput=$('apiKeyInput'), setKeyBtn=$('setKeyBtn'), statusMsg=$('statusMsg');
  const toggleBtn=$('toggleSettingsBtn'), settingsPanel=$('settingsPanel'), closeSettingsBtn=$('closeSettingsBtn');
  const modelSelect=$('modelSelect'), tempInput=$('tempInput'), maxTokensInput=$('maxTokensInput');
  const topPInput=$('topPInput'), topKInput=$('topKInput'), sysInstrInput=$('sysInstrInput'), safetySelect=$('safetySelect');
  const saveBtn=$('saveSettingsBtn'), fileInput=$('fileInput'), attachPreview=$('attachPreview');
  const attachWrap=$('attachWrap'), attachBtn=$('attachBtn'), attachMenu=$('attachMenu');
  const fileInputImage=$('fileInputImage'), fileInputVideo=$('fileInputVideo');
  const sidebar=$('sidebar'), sessionList=$('sessionList'), newChatBtn=$('newChatBtn');
  const openSidebarBtn=$('openSidebarBtn'), closeSidebarBtn=$('closeSidebarBtn'), sidebarOverlay=$('sidebarOverlay');
  const sessionTitleEl=$('sessionTitle'), modelBadge=$('modelBadge'), modelBadgeText=$('modelBadgeText');
  const modelSwitchWrap=$('modelSwitchWrap'), modelSwitchPanel=$('modelSwitchPanel');
  const downloadSourceBtn=$('downloadSourceBtn');

  const EPHEMERAL_SIZE_LIMIT = 500000; // ~500KB base64 chars

  let API_KEY = localStorage.getItem('gemini_key') || '';
  let currentModel = localStorage.getItem('gemini_model') || 'gemini-3.5-flash';
  let currentSafety = localStorage.getItem('gemini_safety') || 'BLOCK_NONE';
  
  let sessions = [];
  let currentSessionId = null;
  let pendingFiles = [];

  const modelMeta = {
    'gemini-3.1-flash-lite': { label:'Gemini 3.1 Flash-Lite', name:'3.1 Flash-Lite', desc:'Câu trả lời nhanh nhất' },
    'gemini-3.5-flash': { label:'Gemini 3.5 Flash', name:'3.5 Flash', desc:'Trợ giúp toàn diện' },
    'gemini-2.0-flash': { label:'Gemini 2.0 Flash', name:'2.0 Flash', desc:'Cân bằng tốc độ và chất lượng' },
    'gemini-2.5-pro-preview-03-25': { label:'Gemini 2.5 Pro', name:'2.5 Pro', desc:'Suy luận chuyên sâu, tác vụ phức tạp' }
  };

  apiKeyInput.value = API_KEY;
  modelSelect.value = currentModel;
  safetySelect.value = currentSafety;
  tempInput.value = parseFloat(localStorage.getItem('gemini_temp')) || .7;
  maxTokensInput.value = parseInt(localStorage.getItem('gemini_maxTokens')) || 800;
  topPInput.value = parseFloat(localStorage.getItem('gemini_topP')) || .95;
  topKInput.value = parseInt(localStorage.getItem('gemini_topK')) || 40;
  sysInstrInput.value = localStorage.getItem('gemini_sysInstr') || sysInstrInput.value;

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function formatSize(bytes){
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  /* ---------------- Sessions: load / save ---------------- */
  function loadSessions(){
    try {
      const raw = JSON.parse(localStorage.getItem('gemini_sessions') || '[]');
      return Array.isArray(raw) ? raw : [];
    } catch(e){ return []; }
  }

  function serializeForStorage(list){
    return list.map(s => ({
      ...s,
      messages: s.messages.map(m => ({
        ...m,
        files: (m.files||[]).map(f => f.ephemeral
          ? { name:f.name, type:f.type, size:f.size, ephemeral:true }
          : f)
      }))
    }));
  }

  function saveSessions(){
    try {
      localStorage.setItem('gemini_sessions', JSON.stringify(serializeForStorage(sessions)));
      if (currentSessionId) localStorage.setItem('gemini_current_session', currentSessionId);
    } catch(e){
      addSystemMsg('⚠️ Không thể lưu lịch sử (bộ nhớ trình duyệt đầy). Tệp lớn sẽ không được giữ lại sau khi tải lại trang.');
    }
  }

  function getCurrentSession(){
    return sessions.find(s => s.id === currentSessionId) || null;
  }

  function createSession(){
    const s = { id: uid(), title:'Cuộc trò chuyện mới', titleSet:false, model: currentModel, createdAt: Date.now(), messages: [] };
    sessions.unshift(s);
    currentSessionId = s.id;
    saveSessions();
    renderSidebar();
    renderMessages();
    updateHeader();
    return s;
  }

  function selectSession(id){
    currentSessionId = id;
    const s = getCurrentSession();
    if (s) modelSelect.value = s.model || currentModel;
    renderSidebar();
    renderMessages();
    updateHeader();
    localStorage.setItem('gemini_current_session', id);
    closeSidebarMobile();
  }

  function deleteSession(id){
    const idx = sessions.findIndex(s => s.id === id);
    if (idx === -1) return;
    sessions.splice(idx, 1);
    if (currentSessionId === id) {
      if (sessions.length) selectSession(sessions[0].id);
      else createSession();
    }
    saveSessions();
    renderSidebar();
  }

  function updateHeader(){
    const s = getCurrentSession();
    sessionTitleEl.textContent = s ? s.title : 'Cuộc trò chuyện mới';
    const activeModel = s?.model || currentModel;
    const meta = modelMeta[activeModel];
    modelBadgeText.textContent = meta ? meta.label : activeModel;
  }

  /* ---------------- Quick model switcher ---------------- */
  const CHECK_ICON_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6L9 17l-5-5"/></svg>`;

  function renderModelSwitchPanel(){
    const activeModel = getCurrentSession()?.model || currentModel;
    modelSwitchPanel.innerHTML = Object.entries(modelMeta).map(([id, m]) => `
      <div class="model-switch-item ${id === activeModel ? 'active' : ''}" data-model="${id}">
        <span class="msi-check">${CHECK_ICON_SVG}</span>
        <span>
          <div class="msi-name">${m.name}</div>
          <div class="msi-desc">${m.desc}</div>
        </span>
      </div>`).join('');
    modelSwitchPanel.querySelectorAll('.model-switch-item').forEach(item => {
      item.addEventListener('click', () => selectModelQuick(item.dataset.model));
    });
  }
  function openModelSwitch(){
    renderModelSwitchPanel();
    modelSwitchPanel.classList.add('open');
    modelBadge.classList.add('open');
  }
  function closeModelSwitch(){
    modelSwitchPanel.classList.remove('open');
    modelBadge.classList.remove('open');
  }
  function selectModelQuick(modelId){
    if (!modelMeta[modelId]) return;
    currentModel = modelId;
    localStorage.setItem('gemini_model', currentModel);
    modelSelect.value = modelId; 
    const s = getCurrentSession();
    if (s) s.model = modelId;
    saveSessions();
    updateHeader();
    closeModelSwitch();
    statusMsg.textContent = `✅ Đã đổi sang ${modelMeta[modelId].label}`;
  }
  modelBadge.addEventListener('click', (e) => {
    e.stopPropagation();
    modelSwitchPanel.classList.contains('open') ? closeModelSwitch() : openModelSwitch();
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.model-switch-wrap')) closeModelSwitch();
  });

  /* ---------------- Sidebar render ---------------- */
  function renderSidebar(){
    sessionList.innerHTML = '';
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      item.textContent = s.title || 'Cuộc trò chuyện mới';
      item.addEventListener('click', () => selectSession(s.id));
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"></path></svg>';
      del.title = 'Xoá cuộc trò chuyện';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm('Xoá cuộc trò chuyện này?')) deleteSession(s.id);
      });
      item.appendChild(del);
      sessionList.appendChild(item);
    });
  }

  function openSidebarMobile(){ sidebar.classList.add('open'); sidebarOverlay.classList.add('show'); }
  function closeSidebarMobile(){ sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); }

  /* ---------------- Message rendering ---------------- */
  function escapeHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  const COPY_ICON_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;

  function formatBotText(raw){
    const codeBlocks = [];
    let working = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
      const idx = codeBlocks.length;
      codeBlocks.push({ lang: (lang||'').trim(), code: code.replace(/\n$/, '') });
      return `\u0000CODEBLOCK${idx}\u0000`;
    });

    let text = escapeHtml(working);
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\n[\-•] (.+)/g, '\n<li>$1</li>');
    text = text.replace(/(<li>[\s\S]*?<\/li>)(?!\s*<li>)/g, '<ul>$1</ul>');
    text = text.replace(/\n/g, '<br>');

    text = text.replace(/\u0000CODEBLOCK(\d+)\u0000/g, (m, idxStr) => {
      const b = codeBlocks[Number(idxStr)];
      const langLabel = escapeHtml(b.lang || 'text');
      const escapedCode = escapeHtml(b.code);
      const encodedCode = encodeURIComponent(b.code);
      return `<div class="code-card">
        <div class="code-card-head">
          <span class="code-card-lang">${langLabel}</span>
          <button class="code-copy-btn" data-code="${encodedCode}">${COPY_ICON_SVG}<span>Sao chép</span></button>
        </div>
        <pre><code>${escapedCode}</code></pre>
      </div>`;
    });
    return text;
  }

  function copyToClipboard(text, btnEl){
    const done = (ok) => {
      if (btnEl) {
        const label = btnEl.querySelector('span:last-child');
        const prev = label ? label.textContent : null;
        if (label) label.textContent = ok ? 'Đã chép!' : 'Lỗi';
        setTimeout(() => { if (label && prev !== null) label.textContent = prev; }, 1500);
      }
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => done(true)).catch(() => fallbackCopy(text, done));
    } else {
      fallbackCopy(text, done);
    }
  }
  function fallbackCopy(text, cb){
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      cb(ok);
    } catch(e) { cb(false); }
  }

  function renderFileNode(f){
    const wrap = document.createElement('div');
    if (!f.base64) {
      wrap.className = 'file-chip expired';
      wrap.textContent = `📎 ${f.name} (${formatSize(f.size||0)}) — đã hết hạn sau khi tải lại trang`;
      return wrap;
    }
    if (f.type && f.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.src = f.base64; img.className = 'file-preview';
      return img;
    }
    if (f.type && f.type.startsWith('video/')) {
      const vid = document.createElement('video');
      vid.src = f.base64; vid.className = 'file-preview'; vid.controls = true;
      return vid;
    }
    wrap.className = 'file-chip';
    wrap.textContent = `📎 ${f.name} (${formatSize(f.size||0)})`;
    return wrap;
  }

  function addMessageDom(msg){
    const div = document.createElement('div');
    div.className = `msg ${msg.role}`;
    if (msg.role === 'bot') {
      div.innerHTML = formatBotText(msg.text || '');
      div.querySelectorAll('.code-copy-btn').forEach(btn => {
        btn.addEventListener('click', () => copyToClipboard(decodeURIComponent(btn.dataset.code || ''), btn));
      });
    } else {
      div.textContent = msg.text || '';
    }
    (msg.files || []).forEach(f => div.appendChild(renderFileNode(f)));
    if (msg.text && msg.text.trim().length > 0) {
      const copyBtn = document.createElement('button');
      copyBtn.className = 'msg-copy-btn';
      copyBtn.innerHTML = `${COPY_ICON_SVG}<span>Sao chép</span>`;
      copyBtn.addEventListener('click', () => copyToClipboard(msg.text, copyBtn));
      div.appendChild(document.createElement('br'));
      div.appendChild(copyBtn);
    }
    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }

  function addSystemDom(text){
    const div = document.createElement('div');
    div.className = 'msg system';
    div.textContent = text;
    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }

  function addSystemMsg(text){
    const s = getCurrentSession();
    if (s) {
      s.messages.push({ id: uid(), role:'system', text, ts: Date.now() });
      saveSessions();
    }
    addSystemDom(text);
  }

  function renderMessages(){
    msgContainer.innerHTML = '';
    const s = getCurrentSession();
    if (!s || s.messages.length === 0) {
      addSystemDom('🔑 Nhập API Key và bắt đầu chat');
      addMessageDom({ role:'bot', text:'Chào bạn! Gemini Chat sẵn sàng.\nCó thể gửi ảnh, video, PDF hoặc bất kỳ tệp nào kèm tin nhắn.' });
      return;
    }
    s.messages.forEach(m => {
      if (m.role === 'system') addSystemDom(m.text);
      else addMessageDom(m);
    });
  }

  function showTyping(){
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }
  function hideTyping(){
    const el = $('typingIndicator');
    if (el) el.remove();
  }

  /* ---------------- File handling ---------------- */
  function fileToBase64(file){
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  async function buildFileMeta(file){
    const base64 = await fileToBase64(file);
    const isVideo = file.type.startsWith('video/');
    const tooBig = base64.length > EPHEMERAL_SIZE_LIMIT;
    return {
      name: file.name,
      type: file.type || 'application/octet-stream',
      size: file.size,
      base64,
      ephemeral: isVideo || tooBig
    };
  }

  function renderAttachPreview(){
    attachPreview.innerHTML = '';
    pendingFiles.forEach((f, idx) => {
      const chip = document.createElement('div');
      chip.className = 'attach-chip';
      const label = document.createElement('span');
      label.textContent = `${f.type && f.type.startsWith('image/') ? '🖼️' : f.type && f.type.startsWith('video/') ? '🎬' : '📄'} ${f.name}`;
      const rm = document.createElement('button');
      rm.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"></path></svg>';
      rm.addEventListener('click', () => { pendingFiles.splice(idx,1); renderAttachPreview(); });
      chip.appendChild(label); chip.appendChild(rm);
      attachPreview.appendChild(chip);
    });
    updateSendState();
  }

  function openAttachMenu(){
    attachMenu.classList.add('open');
    attachBtn.classList.add('open');
  }
  function closeAttachMenu(){
    attachMenu.classList.remove('open');
    attachBtn.classList.remove('open');
  }
  attachBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    attachMenu.classList.contains('open') ? closeAttachMenu() : openAttachMenu();
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.attach-wrap')) closeAttachMenu();
  });

  function handleFilesPicked(e){
    pendingFiles.push(...Array.from(e.target.files));
    renderAttachPreview();
    e.target.value = '';
    closeAttachMenu();
  }
  fileInput.addEventListener('change', handleFilesPicked);
  fileInputImage.addEventListener('change', handleFilesPicked);
  fileInputVideo.addEventListener('change', handleFilesPicked);

  /* ---------------- Gemini API ---------------- */
  function buildContents(session){
    const msgs = session.messages.filter(m => m.role !== 'system');
    return msgs.map((m, i) => {
      const isLatestUser = i === msgs.length - 1 && m.role === 'user';
      let parts = [];
      let text = m.text || '';
      if (m.files && m.files.length) {
        if (isLatestUser) {
          m.files.forEach(f => {
            if (f.base64) parts.push({ inline_data: { mime_type: f.type, data: f.base64.split(',')[1] } });
          });
        } else {
          text += ' ' + m.files.map(f => `[tệp đính kèm: ${f.name}]`).join(' ');
        }
      }
      parts.unshift({ text: text || '(tệp đính kèm)' });
      return { role: m.role === 'bot' ? 'model' : 'user', parts };
    });
  }

  async function callGemini(session){
    if (!API_KEY) { addSystemMsg('❌ Chưa có API Key.'); return; }
    const model = session.model || currentModel;
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
    
    const usedTemp = parseFloat(tempInput.value) || .7;
    const usedMaxTokens = parseInt(maxTokensInput.value) || 800;
    const usedTopP = parseFloat(topPInput.value) || .95;
    const usedTopK = parseInt(topKInput.value) || 40;
    const usedSysInstr = sysInstrInput.value || 'Bạn là trợ lý AI.';
    const selectedSafety = safetySelect.value || 'BLOCK_NONE';

    const buildSafetySettings = (threshold) => [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: threshold },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: threshold },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: threshold },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: threshold }
    ];

    const payload = {
      contents: buildContents(session),
      systemInstruction: { parts: [{ text: usedSysInstr }] },
      safetySettings: buildSafetySettings(selectedSafety),
      generationConfig: { temperature: usedTemp, maxOutputTokens: usedMaxTokens, topP: usedTopP, topK: usedTopK }
    };

    try {
      statusMsg.textContent = '⏳ Đang xử lý...';
      showTyping();
      
      let response = await fetch(url, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(payload) 
      });

      // Cơ chế Fallback thông minh: Thử lại với BLOCK_ONLY_HIGH nếu bị từ chối BLOCK_NONE
      if (!response.ok && response.status === 400 && selectedSafety === 'BLOCK_NONE') {
        const errData = await response.json().catch(() => ({}));
        const errMsg = errData.error?.message || '';
        
        if (errMsg.includes('BLOCK_NONE') || errMsg.includes('safety') || errMsg.includes('SafetyThreshold')) {
          addSystemMsg('⚠️ Google từ chối quyền BLOCK_NONE trên tài khoản này. Hệ thống tự động kích hoạt chế độ lọc tối thiểu tiếp theo (BLOCK_ONLY_HIGH) để tránh lỗi...');
          
          payload.safetySettings = buildSafetySettings('BLOCK_ONLY_HIGH');
          response = await fetch(url, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(payload) 
          });
        }
      }

      hideTyping();
      
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        let errMsg = errData.error?.message || 'Lỗi không xác định';
        if (response.status === 403 || response.status === 401) errMsg = 'Sai key hoặc key không hợp lệ.';
        if (response.status === 429) errMsg = 'Vượt giới hạn tốc độ (rate limit). Vui lòng thử lại sau.';
        addSystemMsg(`❌ Lỗi: ${errMsg}`);
        statusMsg.textContent = '❌ Lỗi';
        return;
      }
      
      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '(Không có nội dung do bộ lọc an toàn chặn)';
      
      const firstCandidate = data.candidates?.[0];
      if (firstCandidate && firstCandidate.finishReason === 'SAFETY') {
        addSystemMsg('⚠️ Nội dung này vi phạm các điều khoản nền tảng cốt lõi của Google (không thể bỏ qua bằng BLOCK_NONE). Hãy viết lại câu hỏi.');
      }

      session.messages.push({ id: uid(), role:'bot', text, ts: Date.now() });
      addMessageDom({ role:'bot', text });
      saveSessions();
      statusMsg.textContent = '✅ Nhận phản hồi';
    } catch (e) {
      hideTyping();
      addSystemMsg(`⚠️ Lỗi: ${e.message}`);
      statusMsg.textContent = '⚠️ Lỗi kết nối';
    }
  }

  /* ---------------- Send flow ---------------- */
  function updateSendState(){
    const hasKey = API_KEY?.trim()?.length > 0;
    const hasContent = userInput.value.trim().length > 0 || pendingFiles.length > 0;
    sendBtn.disabled = !hasKey || !hasContent;
  }

  async function handleSend(){
    const text = userInput.value.trim();
    if (!text && pendingFiles.length === 0) return;
    if (!API_KEY) { addSystemMsg('🔑 Vui lòng nhập API Key.'); return; }

    const session = getCurrentSession() || createSession();
    const filesMeta = [];
    for (const f of pendingFiles) filesMeta.push(await buildFileMeta(f));

    const userMsg = { id: uid(), role:'user', text, files: filesMeta, ts: Date.now() };
    session.messages.push(userMsg);
    if (!session.titleSet) {
      session.title = text ? text.slice(0, 40) : (filesMeta[0] ? filesMeta[0].name : 'Cuộc trò chuyện mới');
      session.titleSet = true;
    }
    pendingFiles = [];
    renderAttachPreview();
    addMessageDom(userMsg);
    renderSidebar();
    updateHeader();
    saveSessions();

    userInput.value = '';
    userInput.disabled = true; sendBtn.disabled = true;
    statusMsg.textContent = '⏳ Đang xử lý...';

    await callGemini(session);

    userInput.disabled = false;
    userInput.focus();
    updateSendState();
    if (API_KEY) statusMsg.textContent = '✅ Sẵn sàng';
  }

  /* ---------------- Settings ---------------- */
  function updateChatEnable(){
    const hasKey = API_KEY?.trim()?.length > 0;
    userInput.disabled = !hasKey;
    userInput.placeholder = hasKey ? 'Nhập tin nhắn...' : 'Cần API Key';
    statusMsg.textContent = hasKey ? '✅ Sẵn sàng' : '⛔ Vui lòng nhập API Key';
    updateSendState();
  }

  function saveAllSettings(){
    const key = apiKeyInput.value.trim();
    API_KEY = key; localStorage.setItem('gemini_key', key);
    
    currentModel = modelSelect.value; localStorage.setItem('gemini_model', currentModel);
    currentSafety = safetySelect.value; localStorage.setItem('gemini_safety', currentSafety);
    
    localStorage.setItem('gemini_temp', parseFloat(tempInput.value) || .7);
    localStorage.setItem('gemini_maxTokens', parseInt(maxTokensInput.value) || 800);
    localStorage.setItem('gemini_topP', parseFloat(topPInput.value) || .95);
    localStorage.setItem('gemini_topK', parseInt(topKInput.value) || 40);
    localStorage.setItem('gemini_sysInstr', sysInstrInput.value || 'Bạn là trợ lý AI.');
    
    const s = getCurrentSession();
    if (s) s.model = currentModel;
    saveSessions();
    updateHeader();
    updateChatEnable();
    addSystemMsg('✅ Đã lưu cài đặt');
    statusMsg.textContent = API_KEY ? '✅ Cài đặt đã lưu' : '⛔ Chưa có key';
  }

  /* ---------------- Download Source HTML Function ---------------- */
  function downloadSourceHTML() {
    try {
      const cloneDoc = document.documentElement.cloneNode(true);
      
      const sidebarOpen = cloneDoc.querySelector('#sidebar');
      if (sidebarOpen) sidebarOpen.classList.remove('open');
      const overlayOpen = cloneDoc.querySelector('#sidebarOverlay');
      if (overlayOpen) overlayOpen.classList.remove('show');
      const settingsPanelOpen = cloneDoc.querySelector('#settingsPanel');
      if (settingsPanelOpen) settingsPanelOpen.classList.remove('open');
      const modelSwitchOpen = cloneDoc.querySelector('#modelSwitchPanel');
      if (modelSwitchOpen) modelSwitchOpen.classList.remove('open');
      const modelBadgeOpen = cloneDoc.querySelector('#modelBadge');
      if (modelBadgeOpen) modelBadgeOpen.classList.remove('open');
      const attachMenuOpen = cloneDoc.querySelector('#attachMenu');
      if (attachMenuOpen) attachMenuOpen.classList.remove('open');
      const attachBtnOpen = cloneDoc.querySelector('#attachBtn');
      if (attachBtnOpen) attachBtnOpen.classList.remove('open');

      const htmlContent = '<!DOCTYPE html>\n' + cloneDoc.outerHTML;
      const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      
      a.href = url;
      a.download = 'gemini_chat_optimized_v2.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      addSystemMsg('📥 Mã nguồn HTML của Web Chat đã được tải xuống máy tính của bạn thành công!');
    } catch(e) {
      addSystemMsg('❌ Lỗi khi tải mã nguồn xuống: ' + e.message);
    }
  }

  /* ---------------- Events ---------------- */
  sendBtn.addEventListener('click', handleSend);
  userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
  userInput.addEventListener('input', updateSendState);

  setKeyBtn.addEventListener('click', () => {
    const key = apiKeyInput.value.trim();
    if (!key) { addSystemMsg('⚠️ Key không được để trống.'); return; }
    API_KEY = key; localStorage.setItem('gemini_key', key);
    updateChatEnable(); addSystemMsg('🔑 API Key đã lưu.'); userInput.focus();
  });
  apiKeyInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') setKeyBtn.click(); });

  toggleBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  closeSettingsBtn.addEventListener('click', () => settingsPanel.classList.remove('open'));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      settingsPanel.classList.remove('open');
      closeSidebarMobile();
      closeModelSwitch();
      closeAttachMenu();
    }
  });
  saveBtn.addEventListener('click', saveAllSettings);
  downloadSourceBtn.addEventListener('click', downloadSourceHTML);

  newChatBtn.addEventListener('click', createSession);
  openSidebarBtn.addEventListener('click', openSidebarMobile);
  closeSidebarBtn.addEventListener('click', closeSidebarMobile);
  sidebarOverlay.addEventListener('click', closeSidebarMobile);

  /* ---------------- Mobile keyboard / viewport fix ---------------- */
  function setAppHeight(){
    const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  setAppHeight();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setAppHeight);
    window.visualViewport.addEventListener('scroll', setAppHeight);
  }
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 200));

  userInput.addEventListener('focus', () => {
    setTimeout(() => {
      setAppHeight();
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }, 300);
  });

  /* ---------------- Init ---------------- */
  sessions = loadSessions();
  if (sessions.length === 0) {
    sessions.push({ id: uid(), title:'Cuộc trò chuyện mới', titleSet:false, model: currentModel, createdAt: Date.now(), messages: [] });
  }
  const savedCurrent = localStorage.getItem('gemini_current_session');
  currentSessionId = sessions.find(s => s.id === savedCurrent) ? savedCurrent : sessions[0].id;

  renderSidebar();
  renderMessages();
  updateHeader();
  updateChatEnable();

  if (API_KEY) userInput.focus();
  else apiKeyInput.focus();
})();
</script>

</body></html>
