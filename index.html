<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3.1 Flash-Lite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b141a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .chat-container { width: 100%; max-width: 520px; height: 95vh; max-height: 800px; background: #1e2a32; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .header { background: #2a3b47; padding: 12px 20px; color: #fff; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a4a56; flex-shrink: 0; }
        .header h2 { font-size: 18px; font-weight: 600; }
        .header-actions { display: flex; gap: 8px; }
        .header button { background: #3a4a56; border: none; color: #fff; padding: 4px 16px; border-radius: 30px; font-size: 13px; cursor: pointer; transition: .2s; }
        .header button:hover { background: #4a5a66; }
        .settings-panel { background: #16222b; padding: 12px 16px; border-bottom: 1px solid #2f3f4b; display: none; flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
        .settings-panel.open { display: flex; }
        .settings-panel .group { flex: 1 1 calc(50% - 8px); min-width: 130px; }
        .settings-panel label { display: block; color: #b0c0cc; font-size: 11px; margin-bottom: 2px; font-weight: 500; }
        .settings-panel input, .settings-panel textarea, .settings-panel select { width: 100%; padding: 5px 10px; border: none; border-radius: 14px; background: #2f3f4b; color: #e8edf2; font-size: 12px; outline: none; }
        .settings-panel textarea { resize: vertical; min-height: 40px; border-radius: 10px; }
        .settings-panel .full { flex: 1 1 100%; }
        .settings-panel .btn-save { background: #00a884; border: none; color: #fff; padding: 5px 18px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 12px; }
        .settings-panel .btn-save:hover { background: #00b894; }
        .key-row { display: flex; gap: 6px; align-items: center; }
        .key-row input { flex: 1; }
        .key-row button { background: #3a4a56; border: none; color: #fff; padding: 4px 14px; border-radius: 30px; cursor: pointer; font-size: 11px; white-space: nowrap; }
        .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: #0f1a21; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 16px; word-wrap: break-word; font-size: 14px; line-height: 1.6; animation: fade .2s; }
        .msg.user { align-self: flex-end; background: #056162; color: #fff; border-bottom-right-radius: 4px; }
        .msg.bot { align-self: flex-start; background: #26343f; color: #e0e6ed; border-bottom-left-radius: 4px; white-space: pre-wrap; }
        .msg.bot p { margin: 4px 0; }
        .msg.bot ul, .msg.bot ol { padding-left: 20px; margin: 4px 0; }
        .msg.bot code { background: #1a2630; padding: 2px 6px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 13px; }
        .msg.bot pre { background: #1a2630; padding: 8px 12px; border-radius: 6px; overflow-x: auto; margin: 4px 0; }
        .msg.system { align-self: center; background: #1e2a32; color: #8a9aa8; font-size: 12px; padding: 4px 16px; border-radius: 30px; max-width: 90%; }
        .msg .file-preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 6px; display: block; }
        .msg .file-name { font-size: 12px; color: #8a9aa8; margin-top: 4px; }
        @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .input-area { background: #1e2a32; padding: 8px 12px 12px; display: flex; gap: 8px; border-top: 1px solid #2f3f4b; flex-shrink: 0; flex-wrap: wrap; }
        .input-row { display: flex; gap: 8px; width: 100%; }
        .input-area input[type="text"] { flex: 1; padding: 10px 16px; border: none; border-radius: 30px; background: #2f3f4b; color: #fff; font-size: 14px; outline: none; }
        .input-area input[type="text"]::placeholder { color: #8a9aa8; }
        .input-area .btn-send { background: #00a884; color: #fff; border: none; border-radius: 30px; padding: 0 20px; font-weight: 600; font-size: 14px; cursor: pointer; transition: .2s; }
        .input-area .btn-send:hover { background: #00b894; }
        .input-area .btn-send:disabled { opacity: .4; cursor: not-allowed; }
        .file-buttons { display: flex; gap: 6px; width: 100%; }
        .file-buttons label { background: #2f3f4b; color: #b0c0cc; padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 4px; }
        .file-buttons label:hover { background: #3f4f5b; }
        .file-buttons input[type="file"] { display: none; }
        .status { color: #8a9aa8; font-size: 11px; padding: 2px 14px 6px; text-align: center; flex-shrink: 0; }
        @media (max-width: 480px) { .settings-panel .group { flex: 1 1 100%; } }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h2>⚡ Gemini 3.1</h2>
        <div class="header-actions">
            <button id="toggleSettingsBtn">⚙️</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="group full">
            <label>🔑 API Key</label>
            <div class="key-row">
                <input type="text" id="apiKeyInput" placeholder="Nhập API Key">
                <button id="setKeyBtn">Lưu</button>
            </div>
        </div>
        <div class="group">
            <label>📦 Model</label>
            <select id="modelSelect">
                <option value="gemini-3.1-flash-lite" selected>Gemini 3.1 Flash-Lite</option>
                <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                <option value="gemini-2.5-pro-preview-03-25">Gemini 2.5 Pro</option>
            </select>
        </div>
        <div class="group">
            <label>🌡️ Temp</label>
            <input type="number" id="tempInput" min="0" max="2" step=".1" value=".7">
        </div>
        <div class="group">
            <label>📏 Max tokens</label>
            <input type="number" id="maxTokensInput" min="1" max="8192" value="800">
        </div>
        <div class="group">
            <label>🎯 Top P</label>
            <input type="number" id="topPInput" min="0" max="1" step=".05" value=".95">
        </div>
        <div class="group">
            <label>🔢 Top K</label>
            <input type="number" id="topKInput" min="1" max="40" value="40">
        </div>
        <div class="group full">
            <label>🧠 System Instruction</label>
            <textarea id="sysInstrInput" rows="2">Bạn là trợ lý AI thông minh. Trả lời chi tiết, rõ ràng, có cấu trúc. Sử dụng xuống dòng, bullet points nếu cần.</textarea>
        </div>
        <div class="group full" style="display:flex; justify-content:flex-end;">
            <button class="btn-save" id="saveSettingsBtn">💾 Lưu</button>
        </div>
    </div>

    <div class="messages" id="msgContainer">
        <div class="msg system">🔑 Nhập API Key và bắt đầu chat</div>
        <div class="msg bot">Chào bạn! Gemini 3.1 Flash-Lite sẵn sàng.<br>Có thể gửi ảnh, video, PDF kèm tin nhắn.</div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." disabled>
            <button class="btn-send" id="sendBtn" disabled>Gửi</button>
        </div>
        <div class="file-buttons">
            <label>📷 Ảnh <input type="file" id="imageInput" accept="image/*"></label>
            <label>🎬 Video <input type="file" id="videoInput" accept="video/*"></label>
            <label>📄 PDF <input type="file" id="pdfInput" accept=".pdf"></label>
            <span style="color:#8a9aa8;font-size:11px;margin-left:auto;align-self:center;" id="fileStatus"></span>
        </div>
    </div>
    <div class="status" id="statusMsg">⛔ Chưa có key</div>
</div>

<script>
(function(){
    const $ = id => document.getElementById(id);
    const msgContainer = $('msgContainer'), userInput = $('userInput'), sendBtn = $('sendBtn');
    const apiKeyInput = $('apiKeyInput'), setKeyBtn = $('setKeyBtn'), statusMsg = $('statusMsg');
    const toggleBtn = $('toggleSettingsBtn'), settingsPanel = $('settingsPanel');
    const modelSelect = $('modelSelect'), tempInput = $('tempInput'), maxTokensInput = $('maxTokensInput');
    const topPInput = $('topPInput'), topKInput = $('topKInput'), sysInstrInput = $('sysInstrInput');
    const saveBtn = $('saveSettingsBtn'), fileStatus = $('fileStatus');
    const imageInput = $('imageInput'), videoInput = $('videoInput'), pdfInput = $('pdfInput');

    let API_KEY = localStorage.getItem('gemini_key') || '';
    let currentModel = localStorage.getItem('gemini_model') || 'gemini-3.1-flash-lite';
    let temperature = parseFloat(localStorage.getItem('gemini_temp')) || .7;
    let maxTokens = parseInt(localStorage.getItem('gemini_maxTokens')) || 800;
    let topP = parseFloat(localStorage.getItem('gemini_topP')) || .95;
    let topK = parseInt(localStorage.getItem('gemini_topK')) || 40;
    let systemInstruction = localStorage.getItem('gemini_sysInstr') || 'Bạn là trợ lý AI thông minh. Trả lời chi tiết, rõ ràng, có cấu trúc. Sử dụng xuống dòng, bullet points nếu cần.';
    let uploadedFile = null;

    apiKeyInput.value = API_KEY; modelSelect.value = currentModel; tempInput.value = temperature;
    maxTokensInput.value = maxTokens; topPInput.value = topP; topKInput.value = topK;
    sysInstrInput.value = systemInstruction;

    function updateChatEnable() {
        const hasKey = API_KEY?.trim()?.length > 0;
        userInput.disabled = !hasKey; sendBtn.disabled = !hasKey;
        userInput.placeholder = hasKey ? 'Nhập tin nhắn...' : '🔒 Cần API Key';
        statusMsg.textContent = hasKey ? '✅ Sẵn sàng (Gemini 3.1)' : '⛔ Vui lòng nhập API Key';
    }

    function addMessage(text, sender, fileData = null) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        if (sender === 'bot') {
            // Format text for readability
            const formatted = text.replace(/\n/g, '<br>').replace(/• /g, '• ');
            div.innerHTML = formatted;
        } else {
            div.textContent = text;
        }
        if (fileData) {
            if (fileData.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = fileData.url; img.className = 'file-preview';
                div.appendChild(img);
            } else if (fileData.type.startsWith('video/')) {
                const vid = document.createElement('video');
                vid.src = fileData.url; vid.className = 'file-preview'; vid.controls = true;
                div.appendChild(vid);
            } else {
                const name = document.createElement('div');
                name.className = 'file-name'; name.textContent = `📎 ${fileData.name}`;
                div.appendChild(name);
            }
        }
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function addSystemMsg(text) {
        const div = document.createElement('div');
        div.className = 'msg system'; div.textContent = text;
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }

    async function callGemini(prompt, file = null) {
        if (!API_KEY) { addSystemMsg('❌ Chưa có API Key.'); return; }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${API_KEY}`;
        const usedTemp = parseFloat(tempInput.value) || .7;
        const usedMaxTokens = parseInt(maxTokensInput.value) || 800;
        const usedTopP = parseFloat(topPInput.value) || .95;
        const usedTopK = parseInt(topKInput.value) || 40;
        const usedSysInstr = sysInstrInput.value || 'Bạn là trợ lý AI.';

        let parts = [{ text: prompt }];
        if (file) {
            const base64 = await fileToBase64(file);
            const mimeType = file.type;
            parts.push({
                inline_data: {
                    mime_type: mimeType,
                    data: base64.split(',')[1]
                }
            });
        }

        const payload = {
            contents: [{ role: 'user', parts }],
            systemInstruction: { parts: [{ text: usedSysInstr }] },
            safetySettings: [
                { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
                { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
                { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
                { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
            ],
            generationConfig: { temperature: usedTemp, maxOutputTokens: usedMaxTokens, topP: usedTopP, topK: usedTopK }
        };

        try {
            statusMsg.textContent = '⏳ Đang xử lý...';
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) {
                const errData = await response.json();
                let errMsg = errData.error?.message || 'Lỗi không xác định';
                if (response.status === 403 || response.status === 401) errMsg = 'Sai key hoặc key không hợp lệ.';
                addSystemMsg(`❌ Lỗi: ${errMsg}`);
                statusMsg.textContent = '❌ Lỗi';
                return;
            }
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '(Không có nội dung)';
            addMessage(text, 'bot');
            statusMsg.textContent = '✅ Nhận phản hồi';
        } catch (e) {
            addSystemMsg(`⚠️ Lỗi: ${e.message}`);
            statusMsg.textContent = '⚠️ Lỗi kết nối';
        }
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text && !uploadedFile) return;
        if (!API_KEY) { addSystemMsg('🔑 Vui lòng nhập API Key.'); return; }

        let msgText = text || (uploadedFile ? `[${uploadedFile.name}]` : '');
        if (uploadedFile) {
            const fileUrl = URL.createObjectURL(uploadedFile);
            addMessage(msgText, 'user', { url: fileUrl, type: uploadedFile.type, name: uploadedFile.name });
        } else {
            addMessage(msgText, 'user');
        }

        const fileToSend = uploadedFile;
        uploadedFile = null; fileStatus.textContent = '';
        userInput.value = ''; userInput.disabled = true; sendBtn.disabled = true;
        statusMsg.textContent = '⏳ Đang xử lý...';

        await callGemini(text || 'Mô tả file này', fileToSend);
        userInput.disabled = false; sendBtn.disabled = false; userInput.focus();
        if (API_KEY) statusMsg.textContent = '✅ Sẵn sàng';
    }

    function handleFileInput(input, type) {
        const file = input.files[0];
        if (!file) return;
        uploadedFile = file;
        fileStatus.textContent = `📎 ${file.name}`;
        addSystemMsg(`📤 Đã tải lên: ${file.name}`);
        input.value = '';
    }

    function saveAllSettings() {
        const key = apiKeyInput.value.trim();
        API_KEY = key; localStorage.setItem('gemini_key', key);
        currentModel = modelSelect.value; localStorage.setItem('gemini_model', currentModel);
        temperature = parseFloat(tempInput.value) || .7; localStorage.setItem('gemini_temp', temperature);
        maxTokens = parseInt(maxTokensInput.value) || 800; localStorage.setItem('gemini_maxTokens', maxTokens);
        topP = parseFloat(topPInput.value) || .95; localStorage.setItem('gemini_topP', topP);
        topK = parseInt(topKInput.value) || 40; localStorage.setItem('gemini_topK', topK);
        systemInstruction = sysInstrInput.value || 'Bạn là trợ lý AI.';
        localStorage.setItem('gemini_sysInstr', systemInstruction);
        updateChatEnable();
        addSystemMsg('✅ Đã lưu cài đặt');
        statusMsg.textContent = API_KEY ? '✅ Cài đặt đã lưu' : '⛔ Chưa có key';
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    setKeyBtn.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (!key) { addSystemMsg('⚠️ Key không được để trống.'); return; }
        API_KEY = key; localStorage.setItem('gemini_key', key);
        updateChatEnable(); addSystemMsg('🔑 API Key đã lưu.'); userInput.focus();
    });
    toggleBtn.addEventListener('click', () => {
        settingsPanel.classList.toggle('open');
        toggleBtn.textContent = settingsPanel.classList.contains('open') ? '🔽' : '⚙️';
    });
    saveBtn.addEventListener('click', saveAllSettings);
    apiKeyInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') setKeyBtn.click(); });
    imageInput.addEventListener('change', (e) => handleFileInput(e.target, 'image'));
    videoInput.addEventListener('change', (e) => handleFileInput(e.target, 'video'));
    pdfInput.addEventListener('change', (e) => handleFileInput(e.target, 'pdf'));

    updateChatEnable();
    if (API_KEY) { addSystemMsg('🔑 Key đã tải. Model: ' + currentModel); userInput.focus(); }
    else { apiKeyInput.focus(); }
})();
</script>
</body>
            </html>
